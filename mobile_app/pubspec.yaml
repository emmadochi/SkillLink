name: skilllink_app
description: "SkillLink – On-Demand Artisan Service Marketplace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Fonts
  google_fonts: ^6.2.1

  # UI Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0

  # Maps & Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Charts (Admin-style stats on mobile)
  fl_chart: ^0.68.0

  # Image
  image_picker: ^1.1.0

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
